<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC&S Headstone Order Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #5a8f2e;
            --green-light: #f0f7e6;
            --cyan: #0097a7;
            --cyan-dark: #00838f;
            --bg: #f4f6f9;
            --white: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 10px;
            --shadow: 0 1px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 14px;
        }

        /* ── HEADER ── */
        .app-header {
            background: var(--green);
            color: white;
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
        .header-actions { display: flex; gap: 0.5rem; }

        /* ── BUTTONS ── */
        .btn {
            padding: 0.45rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .btn-primary { background: var(--cyan); color: white; }
        .btn-primary:hover { background: var(--cyan-dark); }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }
        .btn-outline { background: white; color: var(--green); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--green-light); border-color: var(--green); }
        .btn-cyan { background: var(--cyan); color: white; }
        .btn-cyan:hover { background: var(--cyan-dark); }
        .btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #dc2626; color: white; }

        /* ── LAYOUT ── */
        .main-container { display: flex; height: calc(100vh - 56px); }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-box { padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .search-box input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s;
        }
        .search-box input:focus { border-color: var(--cyan); background: white; }

        .filter-tabs {
            display: flex;
            padding: 0.5rem 0.75rem;
            gap: 0.25rem;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }
        .filter-tabs::-webkit-scrollbar { height: 2px; }
        .filter-tab {
            padding: 0.3rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            border-radius: 20px;
            white-space: nowrap;
            color: var(--text-muted);
            transition: all 0.15s;
        }
        .filter-tab:hover { background: var(--bg); color: var(--text); }
        .filter-tab.active { background: var(--cyan); color: white; }

        .order-list { list-style: none; overflow-y: auto; flex: 1; }
        .order-item {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .order-item:hover { background: var(--bg); }
        .order-item.active {
            background: #e8f5e9;
            border-left: 3px solid var(--green);
        }
        .order-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.2rem; }
        .order-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }
        .order-customer { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.35rem; }
        .order-status-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            letter-spacing: 0.02em;
        }

        /* ── CONTENT ── */
        .content-area { flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--bg); }

        /* ── ORDER HEADER CARD ── */
        .order-hero {
            background: var(--green);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .order-hero-left h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
        .order-hero-meta { display: flex; gap: 1.5rem; font-size: 0.85rem; opacity: 0.9; flex-wrap: wrap; }
        .order-hero-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .order-hero-right { text-align: right; }
        .hero-total { font-size: 2rem; font-weight: 700; line-height: 1; }
        .hero-total-label { font-size: 0.8rem; opacity: 0.8; margin-top: 0.2rem; }

        /* ── DETAIL GRID ── */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
        .detail-grid-wide { grid-column: 1 / -1; }

        /* ── CARDS ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg);
        }
        .card-header-icon { font-size: 0.95rem; }
        .card-header-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .card-body { padding: 1rem 1.25rem; }

        /* ── DATA ROWS ── */
        .data-row { display: flex; flex-direction: column; margin-bottom: 0.75rem; }
        .data-row:last-child { margin-bottom: 0; }
        .data-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 0.15rem; }
        .data-value { font-size: 0.9rem; color: var(--text); font-weight: 500; }
        .data-value.empty { color: var(--text-muted); font-weight: 400; font-style: italic; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
        .data-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem 1rem; }

        /* ── STATUS WORKFLOW ── */
        .status-workflow { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .status-pill {
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
            background: var(--bg);
            color: var(--text-muted);
        }
        .status-pill:hover { opacity: 0.85; transform: translateY(-1px); }
        .status-pill.active { color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        /* ── PRICE BREAKDOWN ── */
        .price-table { width: 100%; }
        .price-line { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .price-line:last-of-type { border-bottom: none; }
        .price-line-label { color: var(--text); }
        .price-line-amount { font-weight: 600; color: var(--text); }
        .price-total-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0 0;
            margin-top: 0.5rem;
            border-top: 2px solid var(--border);
        }
        .price-total-line .label { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .price-total-line .amount { font-size: 1.4rem; font-weight: 700; color: var(--green); }
        .price-balance { display: flex; justify-content: space-between; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed var(--border); font-size: 0.85rem; }
        .price-balance .label { color: var(--text-muted); }
        .price-balance .amount { font-weight: 600; color: #ef4444; }

        /* ── INSCRIPTION BOX ── */
        .inscription-box {
            background: var(--bg);
            border-left: 3px solid var(--cyan);
            border-radius: 0 6px 6px 0;
            padding: 0.75rem 1rem;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-top: 0.75rem;
            color: var(--text);
        }

        /* ── ACTIVITY LOG ── */
        .activity-list { list-style: none; }
        .activity-entry {
            display: flex;
            gap: 0.75rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-entry:last-child { border-bottom: none; }
        .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; margin-top: 5px; }
        .activity-content { flex: 1; }
        .activity-text { font-size: 0.875rem; color: var(--text); }
        .activity-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }

        /* ── FILES ── */
        .file-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        /* ── ACTION BAR ── */
        .action-bar {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 0.85rem 1.25rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }
        .action-bar .spacer { flex: 1; }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 100%;
            max-width: 860px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .close-modal { font-size: 1.5rem; border: none; background: none; cursor: pointer; color: var(--text-muted); line-height: 1; }
        .close-modal:hover { color: var(--text); }

        /* ── FORM STYLES ── */
        .form-section {
            background: var(--bg);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--green);
            margin-bottom: 0.85rem;
        }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
        .form-group label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
            transition: border-color 0.15s;
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,151,167,0.1); }
        .form-group textarea { min-height: 90px; resize: vertical; }

        /* ── MISC ── */
        .loading { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60%; color: var(--text-muted); gap: 0.5rem; }
        .empty-state-icon { font-size: 3rem; opacity: 0.4; }
        .empty-state h2 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
        .empty-state p { font-size: 0.9rem; }

        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input[type="checkbox"] { width: auto; }

        /* ── LIVE PRICE INDICATORS (form) ── */
        .price-indicator {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            margin-top: 0.35rem;
            min-height: 1.3em;
        }
        .pi-retail-big {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--green);
            line-height: 1.2;
        }
        .pi-cost-small {
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .pi-cost { color: var(--text-muted); font-size: 0.75rem; }
        .pi-retail { color: var(--green); font-weight: 700; }
        .pi-profit { color: var(--cyan); font-size: 0.72rem; }
        .pi-sep { color: var(--border); }

        /* ── LIVE TOTALS BAR ── */
        .live-totals {
            background: var(--green);
            color: white;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            text-align: center;
            margin: 1rem 0;
        }
        .lt-col { display: flex; flex-direction: column; gap: 0.15rem; }
        .lt-label { font-size: 0.7rem; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.05em; }
        .lt-value { font-size: 1.5rem; font-weight: 700; }

        @media print {
            .app-header, .sidebar, .action-bar { display: none; }
            .main-container { height: auto; }
            .content-area { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>DC&S Headstone Order Tracker</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="showNewOrderModal()">+ New Order</button>
            <button class="btn btn-secondary" onclick="refreshOrders()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="testConnection()">🔍 Test Connection</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search orders..." oninput="filterOrders()">
            </div>
            
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter-tab" data-filter="Enquiry" onclick="setFilter('Enquiry')">Enquiry</button>
                <button class="filter-tab" data-filter="Quoted" onclick="setFilter('Quoted')">Quoted</button>
                <button class="filter-tab" data-filter="Confirmed" onclick="setFilter('Confirmed')">Confirmed</button>
                <button class="filter-tab" data-filter="In Design" onclick="setFilter('In Design')">Design</button>
                <button class="filter-tab" data-filter="Production" onclick="setFilter('Production')">Production</button>
                <button class="filter-tab" data-filter="Ready" onclick="setFilter('Ready')">Ready</button>
                <button class="filter-tab" data-filter="Installed" onclick="setFilter('Installed')">Installed</button>
            </div>

            <ul class="order-list" id="orderList">
                <li class="loading">Loading orders...</li>
            </ul>
        </div>

        <div class="content-area" id="contentArea">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <h2>Select an order to view details</h2>
                <p>or create a new order to get started</p>
            </div>
        </div>
    </div>

    <!-- New/Edit Order Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Order</h2>
                <button class="close-modal" onclick="closeOrderModal()">×</button>
            </div>
            <div id="modalBody">
                <!-- Form will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Configuration
       const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyepZSuAiIOOrVq0R8tJi3Jr4WBmDpKnT9FIOrv-FNXDZ1d5zJrXV6-e-_FMLuerq53/exec';
        const SHEET_ID = '1_pbyhKL1IElgneBZHFIWG76Cv6hNKdUw0fgSHQjMN6M';
        const DRIVE_FOLDER_ID = '1nAxdUKug-s3pEQnX9RCps86crK--Vd4k';
        
        // BeepMate WhatsApp Configuration
        const BEEPMATE_CONFIG = {
            apiKey: 'hpOMtOkD7gxw',
            groupId: '120363425383353139', // Memorials group
            baseUrl: 'https://beepmate.io/send'
        };

        // Send message to BeepMate WhatsApp
        async function sendToWhatsApp(message) {
            try {
                const url = `${BEEPMATE_CONFIG.baseUrl}?key=${BEEPMATE_CONFIG.apiKey}&id=${BEEPMATE_CONFIG.groupId}&msg=${encodeURIComponent(message)}`;
                await fetch(url, { mode: 'no-cors' });
                console.log('WhatsApp message sent');
                return true;
            } catch (error) {
                console.error('Error sending WhatsApp message:', error);
                return false;
            }
        }

        // Upload PDF to Drive then send WhatsApp with link
        async function sendPdfToWhatsApp(doc, docType, filename, summaryLines) {
            try {
                // Convert PDF to base64
                const base64 = doc.output('datauristring').split(',')[1];

                // Upload to the order's Google Drive folder
                const resp = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'uploadFile',
                        orderId: currentOrder.orderId,
                        customerName: currentOrder.customerName,
                        deceasedName: currentOrder.deceasedName,
                        fileName: filename,
                        fileType: docType,
                        fileData: base64,
                        mimeType: 'application/pdf'
                    })
                });

                const result = await resp.json();

                if (result.success && result.viewUrl) {
                    // Rich WhatsApp message with Drive link
                    const emoji = docType === 'Estimate' ? '📄' : docType === 'Invoice' ? '🧾' : '🔨';
                    const msg = `${emoji} *${docType.toUpperCase()}*\n\n` +
                        summaryLines.join('\n') +
                        `\n\n📎 *View PDF:*\n${result.viewUrl}`;
                    await sendToWhatsApp(msg);
                    console.log('PDF uploaded and WhatsApp sent:', result.viewUrl);
                } else {
                    // Drive upload failed — send text-only notification
                    const emoji = docType === 'Estimate' ? '📄' : docType === 'Invoice' ? '🧾' : '🔨';
                    await sendToWhatsApp(`${emoji} *${docType.toUpperCase()}*\n\n` + summaryLines.join('\n') + '\n\n(PDF saved to device — Drive upload failed)');
                }
            } catch (err) {
                console.warn('sendPdfToWhatsApp error:', err);
                // Still send a text notification as fallback
                try {
                    const emoji = docType === 'Estimate' ? '📄' : docType === 'Invoice' ? '🧾' : '🔨';
                    await sendToWhatsApp(`${emoji} *${docType.toUpperCase()} GENERATED*\n\n` + summaryLines.join('\n'));
                } catch(e) {}
            }
        }

        // Status colors
        const STATUS_COLORS = {
            'Enquiry': '#94a3b8',
            'Quoted': '#f59e0b',
            'Confirmed': '#3b82f6',
            'In Design': '#8b5cf6',
            'Production': '#f97316',
            'Ready': '#10b981',
            'Installed': '#059669'
        };

        // Global state
        let allOrders = [];
        let priceBook = {};
        let currentFilter = 'all';
        let currentOrder = null;
        let editingOrderId = null;

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders(); // priceBook is included in the Apps Script response
        });

        // Load price book from Google Sheets
        async function loadPriceBook() {
            try {
                const tabs = ['Headstones', 'Surrounds', 'Stones', 'Accessories', 'Cemetery_Fees', 'New_Inscriptions', 'Additional_Inscriptions'];
                
                for (const tab of tabs) {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${tab}`;
                    const response = await fetch(url);
                    const csv = await response.text();
                    priceBook[tab] = parseCSV(csv);
                }
                
                console.log('Price book loaded:', priceBook);
            } catch (error) {
                console.error('Error loading price book:', error);
            }
        }

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index];
                });
                data.push(row);
            }
            
            return data;
        }

        // Load orders from Google Sheets
        async function loadOrders() {
            try {
                // Use JSONP to avoid CORS issues
                const callbackName = 'handleOrders_' + Date.now();
                
                window[callbackName] = function(data) {
                    allOrders = data.orders || [];
                    if (data.priceBook) {
                        priceBook = data.priceBook;
                    }
                    renderOrderList();
                    delete window[callbackName];
                };
                
                const script = document.createElement('script');
                script.src = SCRIPT_URL + '?callback=' + callbackName;
                script.onerror = function() {
                    console.error('Error loading orders from Google Sheets');
                    document.getElementById('orderList').innerHTML = `
                        <li class="loading" style="color: #ef4444; padding: 1rem;">

                        </li>
                    `;
                    delete window[callbackName];
                };
                
                document.head.appendChild(script);
                
                // Clean up script tag after execution
                setTimeout(() => {
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                }, 5000);
                
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('orderList').innerHTML = `

        // Calculate total
        function calculateTotal(order) {
            let total = 0;

            // Headstone
            const headstone = priceBook.Headstones?.find(h => 
                h.type === order.hsType && h.size === order.hsSize
            );
            if (headstone) {
                total += parseFloat(headstone.sell || 0);
            }

            // Colour adjustment
            if (order.hsColourAdj) {
                total += parseFloat(order.hsColourAdj);
            }

            // Surround
            const surround = priceBook.Surrounds?.find(s => s.type === order.surroundType);
            if (surround) {
                total += parseFloat(surround.baseSell || 0);
                if (order.surroundGranite) {
                    total += parseFloat(surround.graniteSellAdd || 0);
                }
            }

            // Stone
            const stone = priceBook.Stones?.find(s => s.type === order.stoneType);
            if (stone) {
                const stonePrice = order.surroundType ?
                    parseFloat(stone.withSurroundCost || 0) :
                    parseFloat(stone.standaloneCost || 0);
                total += stonePrice;
            }

            // Accessories
            if (order.accessories && Array.isArray(order.accessories)) {
                order.accessories.forEach(acc => {
                    const accessory = priceBook.Accessories?.find(a => a.name === acc);
                    if (accessory) {
                        total += parseFloat(accessory.sell || 0);
                    }
                });
            }

            // Cemetery fee
            const cemetery = priceBook.Cemetery_Fees?.find(c => c.location === order.cemetery);
            if (cemetery) {
                total += parseFloat(cemetery.fee || 0);
            }

            // Inscription lines
            const inscriptionLines = parseInt(order.inscriptionLines || 0);
            const inscriptionPpl = parseFloat(order.inscriptionPpl || 35);
            total += inscriptionLines * inscriptionPpl;

            // Letter charge
            const letters = countLetters(order.inscriptionText || '');
            if (order.inscriptionType === 'additional') {
                const letterCharge = Math.max(200, letters * 5);
                total += letterCharge;
            } else {
                if (letters > 100) {
                    total += (letters - 100) * 4;
                }
            }

            // Extra charges
            if (order.extraCharges && Array.isArray(order.extraCharges)) {
                order.extraCharges.forEach(charge => {
                    total += parseFloat(charge.amount || 0);
                });
            }

            return total;
        }

        // Count letters (letters and numbers, not spaces or punctuation)
        function countLetters(text) {
            if (!text) return 0;
            return text.replace(/[^a-zA-Z0-9]/g, '').length;
        }

        // Render price breakdown — supports both old and new Apps Script field names
        function renderPriceBreakdown(order, total) {
            let html = '';

            // Headstone: new field = hsSellPrice, old field = sellPrice
            const hsPrice = parseFloat(order.hsSellPrice || order.sellPrice) || 0;
            if (hsPrice > 0) {
                const hsLabel = (order.hsType && order.hsSize) ? `${order.hsType} ${order.hsSize}` : 'Headstone';
                html += `<div class="price-line"><span class="price-line-label">Headstone (${hsLabel})</span><span class="price-line-amount">£${hsPrice.toFixed(2)}</span></div>`;
            }

            const surroundPrice = parseFloat(order.surroundSellPrice) || 0;
            if (surroundPrice > 0) {
                const graniteNote = order.surroundGranite ? ' + Granite' : '';
                html += `<div class="price-line"><span class="price-line-label">Surround (${order.surroundType || ''}${graniteNote})</span><span class="price-line-amount">£${surroundPrice.toFixed(2)}</span></div>`;
            }

            const stonePrice = parseFloat(order.stoneSellPrice) || 0;
            if (stonePrice > 0) {
                html += `<div class="price-line"><span class="price-line-label">Stone / Chippings (${order.stoneType || ''})</span><span class="price-line-amount">£${stonePrice.toFixed(2)}</span></div>`;
            }

            const accPrice = parseFloat(order.accessoriesSellPrice) || 0;
            if (accPrice > 0) {
                const accLabel = (order.accessories || []).join(', ') || 'Accessories';
                html += `<div class="price-line"><span class="price-line-label">${accLabel}</span><span class="price-line-amount">£${accPrice.toFixed(2)}</span></div>`;
            }

            const inscPrice = parseFloat(order.inscriptionSellPrice || order.inscriptionCharge) || 0;
            if (inscPrice > 0) {
                const inscType = order.inscriptionType === 'additional' ? 'Additional Inscription' : 'New Inscription';
                html += `<div class="price-line"><span class="price-line-label">${inscType}</span><span class="price-line-amount">£${inscPrice.toFixed(2)}</span></div>`;
            }

            const cemFee = parseFloat(order.cemeteryFee) || 0;
            if (cemFee > 0) {
                html += `<div class="price-line"><span class="price-line-label">Cemetery Fee (${order.cemetery || ''})</span><span class="price-line-amount">£${cemFee.toFixed(2)}</span></div>`;
            }

            const servicesPrice = parseFloat(order.servicesSellPrice) || 0;
            if (servicesPrice > 0) {
                html += `<div class="price-line"><span class="price-line-label">Additional Services</span><span class="price-line-amount">£${servicesPrice.toFixed(2)}</span></div>`;
            }

            if (order.extraCharges && Array.isArray(order.extraCharges)) {
                order.extraCharges.forEach(charge => {
                    html += `<div class="price-line"><span class="price-line-label">${charge.label}</span><span class="price-line-amount">£${parseFloat(charge.amount).toFixed(2)}</span></div>`;
                });
            }

            const displayTotal = parseFloat(order.totalSellPrice || order.totalPrice) || total;
            html += `<div class="price-total-line"><span class="label">Total</span><span class="amount">£${displayTotal.toFixed(2)}</span></div>`;

            const deposit = parseFloat(order.depositPaid) || 0;
            if (deposit > 0) {
                html += `<div class="price-balance"><span class="label">Deposit Paid</span><span class="amount" style="color:#10b981;">-£${deposit.toFixed(2)}</span></div>`;
                html += `<div class="price-balance"><span class="label">Balance Outstanding</span><span class="amount">£${Math.max(0, displayTotal - deposit).toFixed(2)}</span></div>`;
            }

            return html;
        }

        // Get unique values from price book with hardcoded fallbacks
        function getUniqueValues(items, field) {
            if (!items) return [];
            const values = items.map(item => item[field]).filter(Boolean);
            return [...new Set(values)];
        }

        function getHeadstoneTypes() {
            const fromBook = getUniqueValues(priceBook.Headstones, 'type');
            return fromBook.length > 0 ? fromBook : ['Denmore', 'Traditional', 'Flatstone', 'Ledger', 'Kerb Set', 'Cross', 'Celtic Cross', 'Heart'];
        }

        function getHeadstoneSizes() {
            const fromBook = getUniqueValues(priceBook.Headstones, 'size');
            return fromBook.length > 0 ? fromBook : ['2ft', '2.5ft', '3ft', '3.5ft', '4ft', '4.5ft', '5ft'];
        }

        function getCemeteryOptions() {
            const fromBook = (priceBook.Cemetery_Fees || []).map(c => c.location).filter(Boolean);
            return fromBook.length > 0 ? fromBook : [
                'City Cemetery Belfast', 'Roselawn Cemetery', 'Milltown Cemetery',
                'Dundonald Cemetery', 'Carnmoney Cemetery', 'Lisburn Cemetery',
                'Movilla Cemetery', 'Bangor Cemetery', 'Clandeboye Cemetery',
                'Drumbeg Church', 'Ballymena Cemetery', 'Other'
            ];
        }

            let options = '<option value="">Select size</option>';

            if (hsType && priceBook.Headstones) {

                if (sizesForType.length > 0) {
                    options += sizesForType.map(h => {

                    }).join('');
                    sizeSelect.innerHTML = options;
                    updateFormPrices();
                    return;

            // Fallback: show all sizes without prices
            options += getHeadstoneSizes().map(s =>
                `<option value="${s}" ${currentSize === s ? 'selected' : ''}>${s}</option>`
            ).join('');
            sizeSelect.innerHTML = options;
            updateFormPrices();

        const ACCESSORY_OPTIONS = [
            'Vase', 'Flower Container', 'Photo Oval', 'Bronze Plaque',

        // ── LIVE PRICING ──────────────────────────────────────────
        function showPI(id, cost, sell) {
            const el = document.getElementById(id);
            if (!el) return;
            if (!sell && !cost) { el.innerHTML = ''; return; }
            el.innerHTML =
                `<span class="pi-retail-big">£${sell.toFixed(2)}</span>` +
                `<span class="pi-cost-small">Mason cost: £${cost.toFixed(2)}</span>`;
        }

        function updateFormPrices() {
            const g = id => document.getElementById(id);
            const val = id => (g(id) || {}).value || '';

            let totalCost = 0, totalSell = 0;

            // — Headstone —
            const hsType = val('f_hsType');
            const hsSize = val('f_hsSize');
            let hsCost = 0, hsSell = 0;
            if (hsType && hsSize && priceBook.Headstones) {
                const hs = priceBook.Headstones.find(h => h.type === hsType && h.size === hsSize);
                if (hs) { hsCost = parseFloat(hs.cost) || 0; hsSell = parseFloat(hs.sell) || 0; }
            }
            // Colour adjustment
            const hsColour = val('f_hsColour');
            if (hsColour && priceBook.Headstone_Colours) {
                const col = priceBook.Headstone_Colours.find(c => c.name === hsColour || c.colour === hsColour);
                if (col) { hsCost += parseFloat(col.costAdj || col.cost_adj || 0); hsSell += parseFloat(col.sellAdj || col.sell_adj || 0); }
            }
            showPI('pi_headstone', hsCost, hsSell);
            totalCost += hsCost; totalSell += hsSell;

            // — Surround —
            const surroundType = val('f_surroundType');
            const graniteUpgrade = document.getElementById('f_surroundGranite')?.checked;
            let surCost = 0, surSell = 0, granCost = 0, granSell = 0;
            if (surroundType && priceBook.Surrounds) {
                const sur = priceBook.Surrounds.find(s => s.type === surroundType);
                if (sur) {
                    surCost = parseFloat(sur.baseCost || sur.cost) || 0;
                    surSell = parseFloat(sur.baseSell || sur.sell) || 0;
                    if (graniteUpgrade) {
                        granCost = parseFloat(sur.graniteCostAdd) || 0;
                        granSell = parseFloat(sur.graniteSellAdd) || 0;
                    }
                }
            }
            showPI('pi_surround', surCost, surSell);
            const piGran = document.getElementById('pi_granite');
            if (piGran) piGran.innerHTML = graniteUpgrade && granSell > 0
                ? `<span class="pi-cost">Cost £${granCost.toFixed(2)}</span><span class="pi-sep">|</span><span class="pi-retail">Retail £${granSell.toFixed(2)}</span>`
                : '';
            totalCost += surCost + granCost; totalSell += surSell + granSell;

            // — Stone —
            const stoneType = val('f_stoneType');
            let stoneCost = 0, stoneSell = 0;
            if (stoneType && priceBook.Stones) {
                const st = priceBook.Stones.find(s => s.type === stoneType);
                if (st) {
                    stoneCost = parseFloat(surroundType ? (st.withSurroundCost || st.cost) : (st.standaloneCost || st.cost)) || 0;
                    stoneSell = parseFloat(st.sell) || 0;
                }
            }
            showPI('pi_stone', stoneCost, stoneSell);
            totalCost += stoneCost; totalSell += stoneSell;

            // — Cemetery fee —
            const cemetery = val('f_cemetery');
            let cemFee = 0;
            if (cemetery && priceBook.Cemetery_Fees) {
                const cem = priceBook.Cemetery_Fees.find(c => c.location === cemetery);
                if (cem) cemFee = parseFloat(cem.fee || cem.Fee) || 0;
            }
            const piCem = document.getElementById('pi_cemetery');
            if (piCem) piCem.innerHTML = cemFee > 0
                ? `<span class="pi-retail">Fee £${cemFee.toFixed(2)}</span>`
                : '';
            totalCost += cemFee; totalSell += cemFee;

            // — Inscription lines — (display only, no pricing — letter count drives cost)
            const inscLines = parseInt(val('f_inscLines')) || 0;
            const piInsc = document.getElementById('pi_inscription');
            if (piInsc) piInsc.innerHTML = inscLines > 0
                ? `<span class="pi-cost-small">${inscLines} line${inscLines !== 1 ? 's' : ''} — pricing based on letter count below</span>`
                : '';

            // — Inscription text (letter count drives ALL inscription pricing) —
            const inscText = (g('f_inscText') || {}).value || '';
            const inscType = val('f_inscType') || 'new';
            const letters = (inscText.match(/[a-zA-Z0-9]/g) || []).length;
            const ni = priceBook.NewInscription || {};
            const ai = priceBook.AdditionalInscription || {};
            let txtCost = 0, txtSell = 0;
            let inscNote = '';
            if (inscType === 'new') {
                if (letters > 100) {
                    const extra = letters - 100;
                    txtCost = extra * (ni.costPerLetterAfter100 ?? 2);
                    txtSell = extra * (ni.sellPerLetterAfter100 ?? 3);
                    inscNote = `${letters} letters — first 100 free, ${extra} charged`;
                } else {
                    inscNote = `${letters} letters — all included (first 100 free)`;
                }
            } else {
                const cpl = ai.costPerLetterAfter50 ?? 3;
                const spl = ai.sellPerLetterAfter50 ?? 4.5;
                txtCost = letters * cpl;
                txtSell = letters * spl;
                inscNote = `${letters} letters @ £${spl.toFixed(2)}/letter`;
            }
            const piTxt = document.getElementById('pi_inscText');
            if (piTxt) {
                piTxt.innerHTML = letters > 0
                    ? `<span class="pi-cost-small">${inscNote}</span>` +
                      (txtSell > 0 ? `<span class="pi-retail-big" style="margin-top:0.2rem;">£${txtSell.toFixed(2)}</span><span class="pi-cost-small">Mason cost: £${txtCost.toFixed(2)}</span>` : '')
                    : '';
            }
            totalCost += txtCost; totalSell += txtSell;

            // — Accessories —
            const checkedAcc = document.querySelectorAll('[name="accessories"]:checked');
            checkedAcc.forEach(cb => {
                if (priceBook.Accessories) {
                    const acc = priceBook.Accessories.find(a => a.name === cb.value);
                    if (acc) { totalCost += parseFloat(acc.cost) || 0; totalSell += parseFloat(acc.sell) || 0; }
                }
            });

            // — Update totals bar —
            const profit = totalSell - totalCost;
            if (g('lt_cost')) g('lt_cost').textContent = '£' + totalCost.toFixed(2);
            if (g('lt_sell')) g('lt_sell').textContent = '£' + totalSell.toFixed(2);
            if (g('lt_profit')) {
                g('lt_profit').textContent = '£' + profit.toFixed(2);
                g('lt_profit').style.color = profit > 0 ? '#a5d6a7' : '#ef9a9a';
            }
        }
        // ──────────────────────────────────────────────────────────

        // Save order form
        async function saveOrderForm(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const orderData = editingOrderId ? {...currentOrder} : {
                orderId: 'ORD' + Date.now(),
                orderRef: 'HS' + new Date().getFullYear() + '-' + String(allOrders.length + 1).padStart(4, '0'),
                status: 'Enquiry',
                orderDate: new Date().toISOString().split('T')[0],
                log: [],
                files: [],
                accessories: [],
                extraCharges: [],
                masonCharges: []
            };

            // Update order data from form (handle multi-value checkboxes)
            const accessories = formData.getAll('accessories');
            for (let [key, value] of formData.entries()) {
                if (key !== 'accessories') orderData[key] = value;
            }
            orderData.accessories = accessories;

            // Calculate and store prices from price book (safe — won't block save if it fails)
            try {
                const totals = calculateOrderTotals(orderData);
                orderData.hsSellPrice = totals.breakdown.headstone.sell;
                orderData.hsCostPrice = totals.breakdown.headstone.cost;
                orderData.surroundSellPrice = totals.breakdown.surround.sell;
                orderData.surroundCostPrice = totals.breakdown.surround.cost;
                orderData.stoneSellPrice = totals.breakdown.stone.sell;
                orderData.stoneCostPrice = totals.breakdown.stone.cost;
                orderData.inscriptionSellPrice = totals.breakdown.inscription.sell;
                orderData.inscriptionCostPrice = totals.breakdown.inscription.cost;
                orderData.accessoriesSellPrice = totals.breakdown.accessories.sell;
                orderData.accessoriesCostPrice = totals.breakdown.accessories.cost;
                orderData.cemeteryFee = totals.breakdown.cemeteryFee;
                orderData.totalSellPrice = totals.totalSell;
                orderData.totalCostPrice = totals.totalCost;
                orderData.profitMargin = totals.profitMargin;
                orderData.marginPercentage = totals.marginPercentage;
                orderData.balanceDue = Math.max(0, totals.totalSell - (parseFloat(orderData.depositPaid) || 0));
            } catch (calcErr) {
                console.warn('Price calculation error (order will still save):', calcErr);
            }

            // Add activity log entry
            if (!orderData.log) orderData.log = [];
            orderData.log.push({
                id: Date.now().toString(),
                ts: new Date().toISOString(),
                author: 'User',
                text: editingOrderId ? 'Order updated' : 'Order created'
            });

            closeOrderModal();
            await saveOrder(orderData);
        }

        // Save order to Google Sheets
        async function saveOrder(orderData) {
            // Show saving indicator in the list
            const listEl = document.getElementById('orderList');
            const savingBanner = document.createElement('li');
            savingBanner.id = 'savingBanner';
            savingBanner.style.cssText = 'padding:0.75rem 1rem;background:#e8f5e9;color:#2e7d32;font-size:0.85rem;text-align:center;font-weight:600;';
            savingBanner.textContent = '💾 Saving order…';
            if (listEl) listEl.prepend(savingBanner);

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'upsert', order: orderData })
                });

                // Update local list immediately so it shows without waiting
                if (!editingOrderId) {
                    allOrders.unshift(orderData);
                } else {
                    const idx = allOrders.findIndex(o => o.orderId === orderData.orderId);
                    if (idx >= 0) allOrders[idx] = orderData;
                }
                currentOrder = orderData;
                renderOrderList();
                renderOrderDetails(orderData);

                // Also reload from sheet after 3s to confirm server saved it
                setTimeout(() => loadOrders(), 3000);

            } catch (error) {
                console.error('Error saving order:', error);
                alert('Error saving order. Please check your connection and try again.');
            } finally {
                const b = document.getElementById('savingBanner');
                if (b) b.remove();
            }
        }

        // Delete order
        async function deleteOrder() {
            if (!currentOrder) return;
            
            if (!confirm(`Are you sure you want to delete order ${currentOrder.orderRef}?`)) {
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'delete',
                        orderId: currentOrder.orderId
                    })
                });

                setTimeout(() => {
                    loadOrders();
                    currentOrder = null;
                    document.getElementById('contentArea').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <h2>Select an order to view details</h2>
                            <p>or create a new order to get started</p>
                        </div>
                    `;
                }, 1000);
                
                alert('Order deleted successfully!');
            } catch (error) {
                console.error('Error deleting order:', error);
                alert('Error deleting order. Please try again.');
            }
        }

        // ============================================================
        // COST/RETAIL CALCULATION FUNCTIONS
        // ============================================================

        function calculateHeadstonePricing(order) {
    if (!order.hsType || !order.hsSize) {
        return { cost: 0, sell: 0, margin: 0 };
    }
    const headstone = priceBook.Headstones?.find(h =>
        h.type === order.hsType && h.size === order.hsSize
    );
    if (!headstone) {
        return { cost: 0, sell: 0, margin: 0 };
    }
    let cost = parseFloat(headstone.cost) || 0;
    let sell = parseFloat(headstone.sell) || 0;
    if (order.hsColour && order.hsColour !== 'Black') {
        const colour = priceBook.Colours?.find(c => c.name === order.hsColour);
        if (colour) {
            cost += parseFloat(colour.costAdj) || 0;
            sell += parseFloat(colour.sellAdj) || 0;
        }
    }
    return { cost, sell, margin: sell - cost };
}

        function calculateSurroundPricing(order) {
    if (!order.surroundType) {
        return { cost: 0, sell: 0, margin: 0 };
    }
    
    const surround = priceBook.Surrounds?.find(s => 
        s.type === order.surroundType
    );
    
    if (!surround) {
        console.warn('Surround not found in price book:', order.surroundType);
        return { cost: 0, sell: 0, margin: 0 };
    }
    
    let cost = surround.baseCost;
    let sell = surround.baseSell;
    
    // Add granite upgrade if selected
    if (order.surroundGranite) {
        cost += surround.graniteCostAdd;
        sell += surround.graniteSellAdd;
    }
    
    return {
        cost: cost,
        sell: sell,
        margin: sell - cost
    };
}

        function calculateStonePricing(order) {
    if (!order.stoneType || order.stoneType === 'None') {
        return { cost: 0, sell: 0, margin: 0 };
    }
    
    const stone = priceBook.Stones?.find(s => s.type === order.stoneType);
    
    if (!stone) {
        console.warn('Stone not found in price book:', order.stoneType);
        return { cost: 0, sell: 0, margin: 0 };
    }
    
    // Use "with surround" cost if they have a surround
    const cost = order.surroundType ? stone.withSurroundCost : stone.standaloneCost;
    const sell = stone.sell;
    
    return {
        cost: cost,
        sell: sell,
        margin: sell - cost
    };
}

        function calculateInscriptionPricing(order) {
    if (!order.inscriptionText) {
        return { cost: 0, sell: 0, margin: 0, letterCount: 0 };
    }

    const letterCount = (order.inscriptionText.match(/[a-zA-Z0-9]/g) || []).length;

    let cost = 0;
    let sell = 0;

    const ni = priceBook.NewInscription || {};
    const ai = priceBook.AdditionalInscription || {};

    if (order.inscriptionType === 'new') {
        // First 100 letters FREE — charge only for letters over 100
        if (letterCount > 100) {
            const extraLetters = letterCount - 100;
            cost = extraLetters * (ni.costPerLetterAfter100 ?? 2);
            sell = extraLetters * (ni.sellPerLetterAfter100 ?? 3);
        }
    } else {
        // Additional Inscription — charged from letter 1, no free allowance
        const costPerLetter = ai.costPerLetterAfter50 ?? 3;
        const sellPerLetter = ai.sellPerLetterAfter50 ?? 4.5;
        cost = letterCount * costPerLetter;
        sell = letterCount * sellPerLetter;
    }

    return {
        cost,
        sell,
        margin: sell - cost,
        letterCount
    };
}

        function calculateOrderTotals(order) {
    const headstone = calculateHeadstonePricing(order);
    const surround = calculateSurroundPricing(order);
    const stone = calculateStonePricing(order);
    const inscription = calculateInscriptionPricing(order);
    
    // Cemetery fee (pass-through, no margin)
    const cemeteryFee = parseFloat(order.cemeteryFee) || 0;
    
    // Accessories (if present)
    let accessoriesCost = 0;
    let accessoriesSell = 0;
    if (order.accessories && order.accessories.length > 0) {
        order.accessories.forEach(accName => {
            const acc = priceBook.Accessories?.find(a => a.name === accName);
            if (acc) {
                accessoriesCost += acc.cost;
                accessoriesSell += acc.sell;
            }
        });
    }
    
    const totalCost = headstone.cost + surround.cost + stone.cost + 
                     inscription.cost + cemeteryFee + accessoriesCost;
    
    const totalSell = headstone.sell + surround.sell + stone.sell + 
                     inscription.sell + cemeteryFee + accessoriesSell;
    
    const profitMargin = totalSell - totalCost;
    const marginPercentage = totalSell > 0 ? (profitMargin / totalSell) * 100 : 0;
    
    return {
        breakdown: {
            headstone,
            surround,
            stone,
            inscription,
            cemeteryFee,
            accessories: { cost: accessoriesCost, sell: accessoriesSell, margin: accessoriesSell - accessoriesCost }
        },
        totalCost,
        totalSell,
        profitMargin,
        marginPercentage
    };
}

                    `Colour: ${currentOrder.hsColour || 'Black'}${currentOrder.hsFinish ? ' · ' + currentOrder.hsFinish : ''}`,
                    totals.breakdown.headstone.sell);

            if (totals.breakdown.surround.sell > 0)
                row(currentOrder.surroundType, `Grave surround${currentOrder.surroundGranite ? ' · Incl. 6" Granite Foundation' : ''}`, totals.breakdown.surround.sell);

            if (totals.breakdown.stone.sell > 0)
                row(currentOrder.stoneType, 'Stone / Chippings', totals.breakdown.stone.sell);

            (currentOrder.accessories || []).forEach(accName => {
                const acc = (priceBook.Accessories || []).find(a => a.name === accName);
                if (acc && parseFloat(acc.sell) > 0) row(accName, 'Accessory', acc.sell);
            });

            if (totals.breakdown.inscription.sell > 0)
                row(currentOrder.inscriptionType === 'new' ? 'New Inscription' : 'Additional Inscription',
                    `${totals.breakdown.inscription.letterCount} letters`, totals.breakdown.inscription.sell);
            else if (currentOrder.inscriptionText)
                row('New Inscription', 'Included', 0);

            if (totals.breakdown.cemeteryFee > 0)
                row('Cemetery / Churchyard Fee', currentOrder.cemetery, totals.breakdown.cemeteryFee);

            // Totals section
            y += 2;
            doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3); doc.line(20, y, 190, y); y += 6;

            const dep = parseFloat(currentOrder.depositPaid) || 0;
            if (dep > 0) {
                const bal = Math.max(0, totals.totalSell - dep);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5);
                doc.text('Sub Total', 115, y); doc.text(`£${totals.totalSell.toFixed(2)}`, 188, y, { align: 'right' }); y += 7;
                doc.text('Deposit Received', 115, y);
                doc.setTextColor(56, 118, 29); doc.text(`-£${dep.toFixed(2)}`, 188, y, { align: 'right' }); doc.setTextColor(0,0,0); y += 7;
                doc.setLineWidth(0.3); doc.line(110, y - 1, 190, y - 1);
                doc.setFillColor(56, 118, 29); doc.roundedRect(110, y, 80, 12, 2, 2, 'F');
                doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
                doc.text('BALANCE DUE', 115, y + 7.5); doc.text(`£${bal.toFixed(2)}`, 187, y + 7.5, { align: 'right' });
                doc.setTextColor(0, 0, 0); y += 18;
            } else {
                doc.setFillColor(56, 118, 29); doc.roundedRect(110, y - 4, 80, 12, 2, 2, 'F');
                doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
                doc.text('TOTAL DUE', 115, y + 3.5); doc.text(`£${totals.totalSell.toFixed(2)}`, 187, y + 3.5, { align: 'right' });
                doc.setTextColor(0, 0, 0); y += 16;
            }

            // Inscription preview
            if (currentOrder.inscriptionText && y < 225) {
                doc.setDrawColor(200, 200, 200); doc.line(20, y, 190, y); y += 8;
                doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(60, 60, 60);
                doc.text('INSCRIPTION TEXT — Please verify below is correct', 20, y); doc.setTextColor(0, 0, 0); y += 6;
                const iLines = doc.splitTextToSize(currentOrder.inscriptionText, 162);
                const bh = Math.max(14, iLines.length * 5.5 + 8);
                doc.setDrawColor(160, 200, 130); doc.roundedRect(20, y, 170, bh, 2, 2);
                doc.setFont('helvetica', 'italic'); doc.setFontSize(9.5);
                let iy = y + 7;
                iLines.forEach(l => { if (iy > 265) { doc.addPage(); iy = 20; } doc.text(l, 26, iy); iy += 5.5; });
                y += bh + 8;
            }

            // Payment details box
            if (y < 248) {
                y = Math.max(y + 4, 236);
                doc.setDrawColor(200, 200, 200); doc.line(20, y, 190, y); y += 7;
                doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(60, 60, 60);
                doc.text('PAYMENT', 20, y); doc.setTextColor(0, 0, 0); doc.setFont('helvetica', 'normal'); y += 5;
                doc.setFontSize(8.5);
                doc.text('Bank Transfer: David Crymble & Sons  |  Cheques payable to: David Crymble & Sons', 20, y); y += 5;
                doc.text('Payment due within 30 days. Thank you for choosing David Crymble & Sons.', 20, y);
            }

            dcsPdfFooter(doc);
            const bal2 = dep > 0 ? Math.max(0, totals.totalSell - dep) : totals.totalSell;
            const invRef = (currentOrder.orderRef || currentOrder.orderId || '').slice(-8).toUpperCase();
            const invFilename = `Invoice_${invRef}_${new Date().toISOString().slice(0,10)}.pdf`;
            doc.save(invFilename);
            addActivityLog(`Generated Invoice — Total: £${totals.totalSell.toFixed(2)}, Balance: £${bal2.toFixed(2)}`);
            sendPdfToWhatsApp(doc, 'Invoice', invFilename, [
                `Customer: ${currentOrder.customerName}`,
                `In Memory Of: ${currentOrder.deceasedName}`,
                `Ref: ${invRef}`,
                `Total: £${totals.totalSell.toFixed(2)}`,
                `Balance Due: £${bal2.toFixed(2)}`
            ]);
        }

        // ============================================================
        // MASON JOB CARD PDF GENERATOR
        // ============================================================

        function generateMasonJobCard() {
            if (!currentOrder) { alert('Please select an order first'); return; }
            const totals = calculateOrderTotals(currentOrder);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Header
            let y = dcsPdfHeader(doc, 'MASON JOB CARD', 'CONFIDENTIAL — Cost Prices Only — Do Not Share with Customer');

            // Order info bar
            doc.setFillColor(232, 244, 226); doc.rect(20, y, 170, 18, 'F');
            doc.setFontSize(8.5); doc.setFont('helvetica', 'bold');
            doc.text(`Ref: ${(currentOrder.orderRef || currentOrder.orderId || '').slice(-8).toUpperCase()}`, 24, y + 6);
            doc.setFont('helvetica', 'normal');
            doc.text(`Issued: ${new Date().toLocaleDateString('en-GB')}`, 24, y + 13);
            if (currentOrder.installDate) {
                doc.setTextColor(180, 50, 0); doc.setFont('helvetica', 'bold');
                doc.text(`Install Date: ${currentOrder.installDate}`, 108, y + 6);
                doc.setTextColor(0, 0, 0);
            }
            if (currentOrder.graveNumber) {
                doc.setFont('helvetica', 'bold');
                doc.text(`Grave No: ${currentOrder.graveNumber}`, 108, y + 13);
            }
            doc.setFont('helvetica', 'normal'); y += 24;

            // Customer + Deceased boxes (slightly smaller for job card)
            doc.setFillColor(246, 251, 242);
            doc.roundedRect(20, y, 82, 26, 2, 2, 'F');
            doc.roundedRect(108, y, 82, 26, 2, 2, 'F');
            doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor(56, 118, 29);
            doc.text('CUSTOMER', 24, y + 6);
            doc.setTextColor(0,0,0); doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
            doc.text(currentOrder.customerName || '—', 24, y + 13);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
            if (currentOrder.phone) doc.text(`T: ${currentOrder.phone}`, 24, y + 20);

            doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor(56, 118, 29);
            doc.text('DECEASED', 112, y + 6);
            doc.setTextColor(0,0,0); doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
            doc.text(currentOrder.deceasedName || '—', 112, y + 13);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
            if (currentOrder.cemetery) doc.text(`Cemetery: ${currentOrder.cemetery}`, 112, y + 20);
            y += 32;

            // Items table
            y = dcsPdfTableHeader(doc, y, 'COST');

            let alt = false;
            function row(label, sub, amount) {
                if (y > 248) { doc.addPage(); y = 20; }
                if (alt) { doc.setFillColor(246, 251, 242); doc.rect(20, y - 4, 170, 8, 'F'); }
                alt = !alt;
                doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5);
                doc.text(label, 23, y);
                if (sub) {
                    doc.setFontSize(7.5); doc.setTextColor(130, 130, 130);
                    doc.text(sub, 23, y + 4); doc.setTextColor(0, 0, 0); y += 4;
                }
                if (amount !== null && amount !== undefined) {
                    doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5);
                    doc.text(`£${parseFloat(amount).toFixed(2)}`, 188, y, { align: 'right' });
                }
                y += 8;
            }

            if (currentOrder.hsType || currentOrder.hsSize)
                row(`${currentOrder.hsType || ''} Headstone — ${currentOrder.hsSize || ''}`,
                    `Colour: ${currentOrder.hsColour || 'Black'}${currentOrder.hsFinish ? ' · ' + currentOrder.hsFinish : ''}`,
                    totals.breakdown.headstone.cost > 0 ? totals.breakdown.headstone.cost : null);

            if (totals.breakdown.surround.cost > 0)
                row(currentOrder.surroundType, `Grave surround${currentOrder.surroundGranite ? ' · 6" Granite Foundation' : ''}`, totals.breakdown.surround.cost);

            if (totals.breakdown.stone.cost > 0)
                row(currentOrder.stoneType, 'Stone / Chippings', totals.breakdown.stone.cost);

            (currentOrder.accessories || []).forEach(accName => {
                const acc = (priceBook.Accessories || []).find(a => a.name === accName);
                if (acc) row(accName, 'Accessory', acc.cost);
            });

            if (totals.breakdown.inscription.cost > 0)
                row(currentOrder.inscriptionType === 'new' ? 'New Inscription' : 'Additional Inscription',
                    `${totals.breakdown.inscription.letterCount} letters`, totals.breakdown.inscription.cost);
            else if (currentOrder.inscriptionText)
                row('New Inscription', 'Included (within 100 letters)', null);

            if (totals.breakdown.cemeteryFee > 0)
                row('Cemetery Fee', currentOrder.cemetery, totals.breakdown.cemeteryFee);

            // Total to mason
            y += 2;
            doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3); doc.line(20, y, 190, y); y += 6;
            doc.setFillColor(40, 90, 18); doc.roundedRect(110, y - 4, 80, 12, 2, 2, 'F');
            doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
            doc.text('TOTAL TO MASON', 115, y + 3.5); doc.text(`£${totals.totalCost.toFixed(2)}`, 187, y + 3.5, { align: 'right' });
            doc.setTextColor(0, 0, 0); y += 16;

            // Inscription text box
            if (currentOrder.inscriptionText) {
                if (y > 195) { doc.addPage(); y = 20; }
                doc.setFillColor(255, 251, 224); doc.roundedRect(20, y, 170, 7, 1, 1, 'F');
                doc.setFontSize(8.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(110, 75, 0);
                doc.text('INSCRIPTION TEXT — COPY EXACTLY AS SHOWN', 24, y + 4.5);
                doc.setTextColor(0, 0, 0); y += 11;

                const iLines = doc.splitTextToSize(currentOrder.inscriptionText, 160);
                const bh = Math.max(16, iLines.length * 6 + 10);
                doc.setDrawColor(210, 185, 100); doc.setLineWidth(0.4); doc.roundedRect(20, y, 170, bh, 2, 2);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(10.5);
                let iy = y + 8;
                iLines.forEach(l => { if (iy > 265) { doc.addPage(); iy = 20; } doc.text(l, 26, iy); iy += 6; });
                y += bh + 10;
            }

            // Mason notes
            if (currentOrder.masonNotes) {
                if (y > 230) { doc.addPage(); y = 20; }
                doc.setFontSize(8.5); doc.setFont('helvetica', 'bold'); doc.setTextColor(60, 60, 60);
                doc.text('MASON NOTES', 20, y); doc.setTextColor(0, 0, 0); y += 6;
                const nl = doc.splitTextToSize(currentOrder.masonNotes, 165);
                doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
                nl.forEach(l => { if (y > 265) { doc.addPage(); y = 20; } doc.text(l, 22, y); y += 5; });
                y += 5;
            }

            // Signature boxes
            if (y < 248) {
                y = Math.max(y + 5, 240);
                doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3);
                doc.roundedRect(20, y, 80, 22, 2, 2);
                doc.roundedRect(110, y, 80, 22, 2, 2);
                doc.setFontSize(7.5); doc.setTextColor(110, 110, 110); doc.setFont('helvetica', 'normal');
                doc.text('Mason Signature:', 24, y + 6);
                doc.text('Date Completed:', 114, y + 6);
                doc.text('Confirmed correct & complete', 24, y + 18);
                doc.text('Date: ___________', 114, y + 18);
                doc.setTextColor(0, 0, 0);
            }

            dcsPdfFooter(doc);
            const jcRef = (currentOrder.orderRef || currentOrder.orderId || '').slice(-8).toUpperCase();
            const jcFilename = `JobCard_${jcRef}_${new Date().toISOString().slice(0,10)}.pdf`;
            doc.save(jcFilename);
            addActivityLog(`Generated Mason Job Card — Cost: £${totals.totalCost.toFixed(2)}`);
            sendPdfToWhatsApp(doc, 'Job Card', jcFilename, [
                `Customer: ${currentOrder.customerName}`,
                `Deceased: ${currentOrder.deceasedName}`,
                `Ref: ${jcRef}`,
                currentOrder.hsType ? `Stone: ${currentOrder.hsType} ${currentOrder.hsSize || ''}` : '',
                currentOrder.cemetery ? `Cemetery: ${currentOrder.cemetery}` : '',
                currentOrder.installDate ? `Install Date: ${currentOrder.installDate}` : '',
                `Mason Cost: £${totals.totalCost.toFixed(2)}`
            ].filter(Boolean));
        }

        function getPriceLineItems(order) {
            const items = [];
            
            const headstone = priceBook.Headstones?.find(h => 
                h.type === order.hsType && h.size === order.hsSize
            );
            if (headstone) {
                items.push({
                    label: `Headstone (${order.hsType} - ${order.hsSize})`,
                    amount: parseFloat(headstone.sell || 0)
                });
            }
            
            if (order.hsColourAdj) {
                items.push({
                    label: 'Colour Adjustment',
                    amount: parseFloat(order.hsColourAdj)
                });
            }
            
            const surround = priceBook.Surrounds?.find(s => s.type === order.surroundType);
            if (surround) {
                items.push({
                    label: `Surround (${order.surroundType})`,
                    amount: parseFloat(surround.baseSell || 0)
                });
                if (order.surroundGranite) {
                    items.push({
                        label: 'Granite Upgrade',
                        amount: parseFloat(surround.graniteSellAdd || 0)
                    });
                }
            }

            const stone = priceBook.Stones?.find(s => s.type === order.stoneType);
            if (stone) {
                const stonePrice = order.surroundType ?
                    parseFloat(stone.withSurroundCost || 0) :
                    parseFloat(stone.standaloneCost || 0);
                items.push({
                    label: `Stone (${order.stoneType})`,
                    amount: stonePrice
                });
            }

            if (order.accessories && Array.isArray(order.accessories)) {
                order.accessories.forEach(acc => {
                    const accessory = priceBook.Accessories?.find(a => a.name === acc);
                    if (accessory) {
                        items.push({
                            label: acc,
                            amount: parseFloat(accessory.sell || 0)
                        });
                    }
                });
            }

            const cemetery = priceBook.Cemetery_Fees?.find(c => c.location === order.cemetery);
            if (cemetery) {
                items.push({
                    label: `Cemetery Fee (${order.cemetery})`,
                    amount: parseFloat(cemetery.fee || 0)
                });
            }
            
            const inscriptionLines = parseInt(order.inscriptionLines || 0);
            const inscriptionPpl = parseFloat(order.inscriptionPpl || 35);
            if (inscriptionLines > 0) {
                items.push({
                    label: `Inscription (${inscriptionLines} lines @ £${inscriptionPpl})`,
                    amount: inscriptionLines * inscriptionPpl
                });
            }
            
            const letters = countLetters(order.inscriptionText || '');
            if (order.inscriptionType === 'additional') {
                const letterCharge = Math.max(200, letters * 5);
                items.push({
                    label: `Additional Inscription (${letters} letters)`,
                    amount: letterCharge
                });
            } else {
                if (letters > 100) {
                    const extraLetters = letters - 100;
                    items.push({
                        label: `Extra Letters (${extraLetters} @ £4)`,
                        amount: extraLetters * 4
                    });
                }
            }
            
            if (order.extraCharges && Array.isArray(order.extraCharges)) {
                order.extraCharges.forEach(charge => {
                    items.push({
                        label: charge.label,
                        amount: parseFloat(charge.amount || 0)
                    });
                });
            }
            
            return items;
        }

        function addActivityLog(text) {
            if (!currentOrder) return;
            if (!currentOrder.log) currentOrder.log = [];
            currentOrder.log.push({
                id: Date.now().toString(),
                ts: new Date().toISOString(),
                author: 'System',
                text: text
            });
            saveOrder(currentOrder);
        }

        function sendWhatsAppNotification(type, data) {
            const messages = {
                estimate: `📄 *ESTIMATE GENERATED*\n\nCustomer: ${data.customer}\nDeceased: ${data.deceased}\nReference: ${data.reference}\nTotal: £${data.total}\n\nEstimate downloaded and ready to send.`,
                job_card: `🔨 *MASON JOB CARD GENERATED*\n\nCustomer: ${data.customer}\nDeceased: ${data.deceased}\nReference: ${data.reference}\nMason Cost: £${data.total}\n\nJob card downloaded and ready for mason.`
            };
            const message = messages[type] || `Notification: ${type}`;
            sendToWhatsApp(message);
        }

    </script>
